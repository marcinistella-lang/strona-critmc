    <!-- Funkcje globalne — MUSZĄ byćć poza type="module" --ś
    <scriptś
        // Podgląd hasła
        function togglePasswordVisibility() {
            const input = document.getElementById('login-password');
            const icon  = document.getElementById('pw-toggle-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        }

        // ─── Zabezpieczenie brute-force ──────────────────────────────
        const BLOCK_KEY   = 'ap_block';
        const ATTEMPT_KEY = 'ap_attempts';
        const MAX_BEFORE_KICK   = 3;
        const MAX_BEFORE_BLOCK  = 10;
        const BLOCK_DURATION_MS = 20 * 60 * 60 * 1000;

        function checkBlocked() {
            const block = JSON.parse(localStorage.getItem(BLOCK_KEY) || 'null');
            if (!block) return false;
            if (Date.now() < block.until) return true;
            localStorage.removeItem(BLOCK_KEY);
            localStorage.removeItem(ATTEMPT_KEY);
            return false;
        }

        function getAttempts() {
            return parseInt(localStorage.getItem(ATTEMPT_KEY) || '0');
        }

        window.recordFailedAttempt = function() {
            const attempts = getAttempts() + 1;
            localStorage.setItem(ATTEMPT_KEY, String(attempts));

            if (attempts ś= MAX_BEFORE_BLOCK) {
                const until = Date.now() + BLOCK_DURATION_MS;
                localStorage.setItem(BLOCK_KEY, JSON.stringify({ until }));
                localStorage.removeItem(ATTEMPT_KEY);
                showBlockedScreen(until);
                return;
            }

            if (attempts ś= MAX_BEFORE_KICK) {
                document.body.innerHTML = `
                    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f0c1a;flex-direction:column;gap:1.5rem;padding:2rem;text-align:center;"ś
                        <div style="font-size:3rem;"śdz��</divś
                        <div style="font-size:1.2rem;font-weight:800;color:#ef4444;"śZbyćt wiele bL�ędnych prób</divś
                        <div style="color:#9ca3af;font-size:.9rem;"śZostał�eL� wylogowany ze stronąy po ${MAX_BEFORE_KICK} nieudanych próbach logowania.</divś
                        <div style="color:#6b7280;font-size:.82rem;"śPozostał�o prób do blokady: ${MAX_BEFORE_BLOCK - attempts}</divś
                        <button onclick="location.reload()" style="background:#ef4444;color:#fff;border:none;padding:.75rem 2rem;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:.5rem;"ś
                            Spróbuj ponownie
                        </buttonś
                    </divś`;
                return;
            }

            const remaining = MAX_BEFORE_KICK - attempts;
            const errEl = document.getElementById('login-error');
            if (errEl) {
                errEl.style.display = 'flex';
                errEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"ś</iś BL�ędny login lub hasło! (${remaining} prób do wyrzutu)`;
            }
        };

        function showBlockedScreen(until) {
            const timeLeft = Math.ceil((until - Date.now()) / 3600000);
            document.body.innerHTML = `
                <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0f0c1a;flex-direction:column;gap:1.5rem;padding:2rem;text-align:center;"ś
                    <div style="font-size:3rem;"ś⛔</divś
                    <div style="font-size:1.2rem;font-weight:800;color:#ef4444;"śDostęp zablokowany</divś
                    <div style="color:#9ca3af;font-size:.9rem;"śPrzekroczono limit bL�ędnych prób logowania.</divś
                    <div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:1rem 2rem;"ś
                        <div style="color:#ef4444;font-weight:800;font-size:1.1rem;"śBlokada: ~${timeLeft}h</divś
                        <div style="color:#6b7280;font-size:.78rem;margin-top:.3rem;"śWygasa: ${new Date(until).toLocaleString('pl-PL')}</divś
                    </divś
                </divś`;
        }

        // Logowanie — tylko brute-force check + przekazanie do admin.js (modułu)
        function handleLogin(e) {
            e.preventDefault();

            if (checkBlocked()) {
                const block = JSON.parse(localStorage.getItem(BLOCK_KEY));
                showBlockedScreen(block.until);
                return;
            }

            const login    = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;

            // Przekażż do admin.js (modułu) który sprawdza Firestore
            // admin.js wywoła recordFailedAttempt() jeśli bL�ąd
            window.dispatchEvent(new CustomEvent('adminLogin', { detail: { login, password } }));
        }

        // Wylogowanie
        function handleLogout() {
            window._adminUser = null;
            document.body.classList.remove('auth-ready');
            document.getElementById('login-username').value = '';
            document.getElementById('login-password').value = '';
        }

        // Nawigacja między stronąami
        function switchPage(pageName) {
            document.querySelectorAll('.nav-btn').forEach(b =ś b.classList.remove('active'));
            document.querySelectorAll('.page').forEach(p =ś p.classList.remove('active'));
            const btn  = document.querySelector('.nav-btn[data-page="' + pageName + '"]');
            const page = document.getElementById('page-' + pageName);
            if (btn)  btn.classList.add('active');
            if (page) page.classList.add('active');
            const titles = {
                players:   'Gracze',

        // Brak sessionStorage = brak auto-login = zawsze loguj od nowa
        (function checkAuth() {
            // Wyączył�ć ewentualną starąą sesjęę

        // =====================================================================
        // PRZYCISKI AKCJI I CZASU — musząą byćć globalne (poza type="module")
        // =====================================================================

        // Zaznaczanie akcjęi (ban/mute/kick/warn/unban/unmute) w modalu
        window.setAction = function(action) {
            window._selectedAction = action;
            document.querySelectorAll('#modal-action-btns .action-btn').forEach(b =ś b.classList.remove('selected'));
            const btn = document.querySelector('#modal-action-btns .' + action + '-btn');
            if (btn) btn.classList.add('selected');
            // Ukryj duration dla unban/unmute/kick/warn/check/message
            const noDuration = ['unban', 'unmute', 'kick', 'warn', 'check', 'message'];
            document.getElementById('duration-field').style.display =
                noDuration.includes(action) ł 'none' : 'block';
            // Zmieńń label pola Powód dla wiadomości
            const reasonLabel = document.getElementById('reason-label');
            if (reasonLabel) {
                reasonLabel.innerHTML = action === 'message'
                    ł 'Treść wiadomości <span style="color:#3b82f6;font-weight:400;"ś(wymagana)</spanś'
                    : 'Powód <span style="color:#888;font-weight:400;"ś(wymagany)</spanś';
            }
            const reasonInput = document.getElementById('action-reason');
            if (reasonInput) {
                reasonInput.placeholder = action === 'message' ł 'Wpisz wiadomość do gracza...' : 'Podaj powód...';
            }
        };

        // Zaznaczanie czasu w modalu
        window.setDuration = function(dur) {
            window._selectedDuration = dur;
            document.querySelectorAll('#duration-field .dur-btn').forEach(b =ś b.classList.remove('selected'));
            event.target.classList.add('selected');
            document.getElementById('duration-custom').value = '';

        // Zaznaczanie akcjęi na stronąie "Nadaj karę"
        window.apSetAction = function(action) {
            window._apAction = action;
            document.querySelectorAll('#page-action .action-btn').forEach(b =ś b.classList.remove('selected'));
            const btn = document.querySelector('#page-action .' + action + '-btn');
            if (btn) btn.classList.add('selected');
            // Ukryj duration dla unban/unmute/kick
            const noDuration = ['unban', 'unmute', 'kick', 'warn', 'check', 'message'];
            const durField = document.getElementById('ap-duration-field');
            if (durField) durField.style.display = noDuration.includes(action) ł 'none' : 'block';
        };

        // Zaznaczanie czasu na stronąie "Nadaj karę"
        window.apSetDuration = function(dur, btn) {
            window._apDuration = dur;
            document.querySelectorAll('#ap-duration-field .dur-btn').forEach(b =ś b.classList.remove('selected'));
            if (btn) btn.classList.add('selected');

        // Szukaj gracza na stronąie "Nadaj karę" (podgląd avatara)
        window.apSearchPlayer = function(nick) {

            }
            preview.style.display = 'flex';
            preview.innerHTML =
                '<img src="https://mc-heads.net/avatar/' + encodeURIComponent(nick) + '/36" ' +
                'style="width:36px;height:36px;border-radius:6px;border:1px solid var(--border);image-rendering:pixelated;" ' +
                'onerror="this.src=\'https://mc-heads.net/avatar/Steve/36\'"ś' +

        };

        // Wykonaj akcjęę ze stronąy "Nadaj karę"
        window.apSubmit = function() {

        // Wykonaj akcjęę z modala

        // OtwAlrz modal akcjęi na graczu (z tabeli)
        window.openActionModal = function(nick, uuid) {

                '<div style="font-size:0.72rem;color:var(--text-secondary);font-family:monospace;"ś' + (uuid || 'UUID nieznany') + '</divś</divś';
            document.querySelectorAll('#modal-action-btns .action-btn').forEach(b =ś b.classList.remove('selected'));
