name = "critmc-b2-files"
main = "worker.js"
compatibility_date = "2024-01-01"

# R2 bucket — podpięty jako env.BUCKET
[[r2_buckets]]
binding    = "BUCKET"
bucket_name = "critmc-files"

# Sekrety — ustaw przez: wrangler secret put ALLOWED_ORIGIN
